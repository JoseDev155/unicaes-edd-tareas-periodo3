<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Aspiradora Philips</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#eef2f6;margin:0;padding:24px;color:#222}
    .card{max-width:800px;margin:40px auto;background:#ffffff;border-radius:18px;box-shadow:0 16px 40px rgba(0,0,0,.10);overflow:hidden}
    .banner{height:120px;background:linear-gradient(135deg,#3456d1,#6aa1ff)}
    .content{padding:24px 28px}
    .name{font-size:22px;font-weight:bold;margin:0 0 6px}
    .desc{color:#444;line-height:1.5;margin:8px 0 12px}
    .price{display:inline-block;font-weight:bold;padding:10px 14px;border-radius:12px;background:#f2f6ff;border:1px solid #cfe0ff}
    .crumbs{font-size:12px;color:#666;margin:0 0 8px}
  </style>
</head>
<body>
  <div class="card">
    <div class="banner"></div>
    <div class="content">
      <div class="crumbs">Hogar &raquo; Limpieza</div>
      <div class="name">Aspiradora Philips</div>
      <div class="desc">Aspiradora compacta con filtro HEPA y depósito fácil de limpiar.</div>
      <div class="price">Precio: $ 89.00</div>
    </div>
  </div>
</body>
</html>
